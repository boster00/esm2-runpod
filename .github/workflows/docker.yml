name: Build and Push to GHCR

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/boster00/esm2-runpod:latest
            ghcr.io/boster00/esm2-runpod:${{ github.sha }}

      - name: Make package public
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.packages.updatePackageForAuthenticatedUser({
                package_type: 'container',
                package_name: 'esm2-runpod',
                visibility: 'public'
              });
              console.log('Package made public');
            } catch (e) {
              console.log('Could not set visibility:', e.message);
            }
